Discovery/Web-Content/raft-*-directories*.txt:        { type: dir,  tags: [generic] }
Discovery/Web-Content/raft-*-files*.txt:              { type: file, tags: [generic] }
Discovery/Web-Content/CMS/wordpress*.txt:             { type: file, tags: [wordpress, php] }
